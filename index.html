<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order師傅</title>
  
  <!-- 載入 Google Fonts: Montserrat & Noto Sans TC -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 設定 Tailwind 自訂主題 (極簡時尚風格 SALT & PEPPER) -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            black: '#111111',
            white: '#ffffff',
            gray: {
              100: '#f8f8f8',
              200: '#eeeeee',
              300: '#dddddd',
              400: '#999999',
              500: '#666666',
              800: '#333333',
            }
          },
          fontFamily: {
            sans: ['"Noto Sans TC"', 'sans-serif'],
            display: ['"Montserrat"', '"Noto Sans TC"', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- 載入 Firebase Compat -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

  <!-- 載入 React 與 Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    /* 全局平滑過渡，去除所有預設圓角 */
    * { 
      border-radius: 0 !important;
      transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease; 
    }
    body { background-color: #ffffff; color: #111111; letter-spacing: 0.05em; }
    
    /* 隱藏捲軸但可滾動 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #dddddd; }
    ::-webkit-scrollbar-thumb:hover { background: #111111; }
    
    /* 輸入框自動填充背景修復 */
    input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 30px white inset !important;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="config.js"></script>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // --- Firebase 初始化區塊 ---
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();
    const storage = firebase.storage();

    // --- 圖示元件定義區 (極簡線條) ---
    const IconPlus = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="square" strokeLinejoin="miter"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const IconTrash = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="square" strokeLinejoin="miter"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14H5V6m3 0V4h8v2"></path></svg>;
    const IconCamera = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="square" strokeLinejoin="miter"><path d="M14.5 4h-5L7 7H3v13h18V7h-4l-2.5-3z"></path><circle cx="12" cy="13" r="3"></circle></svg>;
    const IconEdit = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="square" strokeLinejoin="miter"><path d="M11 4H4v16h16v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
    const IconCheck = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="square" strokeLinejoin="miter"><polyline points="20 6 9 17 4 12"></polyline></svg>;
    const IconX = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="square" strokeLinejoin="miter"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
    const IconArrowLeft = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="square" strokeLinejoin="miter"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
    const IconLoader = ({ className }) => <svg className={`animate-spin ${className}`} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="square" strokeLinejoin="miter"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>;

    // 極簡 PriceInput
    const PriceInput = ({ order, onUpdate }) => {
      const [val, setVal] = useState(order.price);
      useEffect(() => { setVal(order.price); }, [order.price]);
      return (
        <input 
          type="number" 
          min="0" 
          value={val}
          onChange={(e) => setVal(e.target.value)}
          onBlur={() => onUpdate(order.id, val)}
          placeholder="金額"
          className="w-16 px-1 py-1 text-right border-b-2 border-gray-200 bg-transparent focus:outline-none focus:border-black font-display font-bold text-black transition-colors placeholder-gray-300"
        />
      );
    };

    function App() {
      const [role, setRole] = useState('user');
      const [events, setEvents] = useState([]);
      const [loading, setLoading] = useState(true);
      const [currentEventId, setCurrentEventId] = useState(null);
      const [newEventName, setNewEventName] = useState('');
      const [newEventPassword, setNewEventPassword] = useState('');
      const [passwordPromptId, setPasswordPromptId] = useState(null);
      const [passwordPromptAction, setPasswordPromptAction] = useState('enter');
      const [eventPasswordInput, setEventPasswordInput] = useState('');
      const [passwordError, setPasswordError] = useState('');
      const [confirmDeleteId, setConfirmDeleteId] = useState(null);
      const [newName, setNewName] = useState('');
      const [newItem, setNewItem] = useState('');
      const [editingOrderId, setEditingOrderId] = useState(null);
      const [uploading, setUploading] = useState(false);
      const fileInputRef = useRef(null);

      useEffect(() => {
        const unsubscribe = db.collection('events').orderBy('createdAt', 'desc').onSnapshot((snapshot) => {
          const eventsData = snapshot.docs.map(doc => ({
            id: doc.id,
            ...doc.data()
          }));
          setEvents(eventsData);
          setLoading(false);
        }, (error) => {
          console.error("Error:", error);
          setLoading(false);
        });
        return () => unsubscribe();
      }, []);

      const currentEvent = events.find(e => e.id === currentEventId);

      const handleCreateEvent = async (e) => {
        e.preventDefault();
        if (!newEventName.trim()) return;
        try {
          await db.collection('events').add({
            name: newEventName.trim(),
            password: newEventPassword.trim(),
            date: new Date().toLocaleDateString('zh-TW', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }),
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            menuImage: null,
            orders: [],
            isClosed: false
          });
          setNewEventName('');
          setNewEventPassword('');
        } catch (error) {
          alert("建立失敗：" + error.message);
        }
      };

      const handleEventClick = (event) => {
        if (role === 'organizer' && event.password) {
          setPasswordPromptId(event.id);
          setPasswordPromptAction('enter');
          setEventPasswordInput('');
          setPasswordError('');
        } else {
          setCurrentEventId(event.id);
        }
      };

      const handleDeleteClick = (e, event) => {
        e.stopPropagation();
        if (event.password) {
          setPasswordPromptId(event.id);
          setPasswordPromptAction('delete');
          setEventPasswordInput('');
          setPasswordError('');
        } else {
          setConfirmDeleteId(event.id);
        }
      };

      const handleDeleteEvent = async (e, id) => {
        e.stopPropagation();
        try {
          await db.collection('events').doc(id).delete();
          setConfirmDeleteId(null);
          if (currentEventId === id) setCurrentEventId(null);
        } catch (error) {
          alert("刪除失敗：" + error.message);
        }
      };

      const handlePasswordSubmit = async (e) => {
        e.preventDefault();
        e.stopPropagation();
        const targetEvent = events.find(ev => ev.id === passwordPromptId);
        if (targetEvent && targetEvent.password === eventPasswordInput) {
          if (passwordPromptAction === 'delete') {
            try {
              await db.collection('events').doc(targetEvent.id).delete();
              setPasswordPromptId(null);
              if (currentEventId === targetEvent.id) setCurrentEventId(null);
            } catch (error) {
              alert("刪除失敗：" + error.message);
            }
          } else {
            setCurrentEventId(passwordPromptId);
            setRole('organizer');
            setPasswordPromptId(null);
          }
        } else {
          setPasswordError('INVALID PASSWORD');
        }
      };

      const handleRoleChange = (newRole) => {
        if (newRole === 'organizer') {
          setCurrentEventId(null);
          setPasswordPromptId(null);
          setEventPasswordInput('');
          setPasswordError('');
        }
        setRole(newRole);
      };

      const handleImageUpload = async (e) => {
        const file = e.target.files[0];
        if (file && currentEventId) {
          setUploading(true);
          try {
            const storageRef = storage.ref();
            const fileRef = storageRef.child(`menus/${currentEventId}/${Date.now()}_${file.name}`);
            await fileRef.put(file);
            const url = await fileRef.getDownloadURL();
            await db.collection('events').doc(currentEventId).update({ menuImage: url });
          } catch (error) {
            alert("上傳失敗：" + error.message);
          } finally {
            setUploading(false);
          }
        }
      };

      const triggerFileInput = () => { if (fileInputRef.current) fileInputRef.current.click(); };

      const toggleEventClosed = async () => {
        if (!currentEvent) return;
        await db.collection('events').doc(currentEvent.id).update({ isClosed: !currentEvent.isClosed });
      };

      const handleAddOrder = async (e) => {
        e.preventDefault();
        if (!newName.trim() || !newItem.trim() || !currentEvent) return;
        const newOrder = {
          id: Date.now().toString() + Math.random().toString(36).substring(7),
          name: newName.trim(),
          item: newItem.trim(),
          price: '',
          hasPaid: false
        };
        try {
          await db.collection('events').doc(currentEvent.id).update({ orders: firebase.firestore.FieldValue.arrayUnion(newOrder) });
          setNewName('');
          setNewItem('');
        } catch (error) {
          alert("點餐失敗：" + error.message);
        }
      };

      const handleDeleteOrder = async (orderId) => {
        if (!currentEvent) return;
        const newOrders = currentEvent.orders.filter(order => order.id !== orderId);
        await db.collection('events').doc(currentEvent.id).update({ orders: newOrders });
      };

      const toggleEditMode = (orderId) => setEditingOrderId(editingOrderId === orderId ? null : orderId);

      const handleUpdateOrder = async (orderId, updatedName, updatedItem) => {
        if (!currentEvent) return;
        const newOrders = currentEvent.orders.map(order => order.id === orderId ? { ...order, name: updatedName, item: updatedItem } : order);
        await db.collection('events').doc(currentEvent.id).update({ orders: newOrders });
        setEditingOrderId(null);
      };

      const handleUpdatePrice = async (orderId, price) => {
        if (!currentEvent) return;
        const newOrders = currentEvent.orders.map(order => order.id === orderId ? { ...order, price: price } : order);
        await db.collection('events').doc(currentEvent.id).update({ orders: newOrders });
      };

      const handleTogglePaid = async (orderId) => {
        if (!currentEvent) return;
        const newOrders = currentEvent.orders.map(order => order.id === orderId ? { ...order, hasPaid: !order.hasPaid } : order);
        await db.collection('events').doc(currentEvent.id).update({ orders: newOrders });
      };

      const calculateTotal = (orders) => {
        return orders.reduce((total, order) => {
          const priceNum = parseInt(order.price, 10);
          return total + (isNaN(priceNum) ? 0 : priceNum);
        }, 0);
      };

      if (loading) {
        return (
          <div className="min-h-screen bg-white flex flex-col items-center justify-center text-black">
            <IconLoader className="w-10 h-10 mb-4" />
            <p className="font-display font-bold tracking-widest uppercase">Loading</p>
          </div>
        );
      }

      const renderDashboard = () => (
        <div className="max-w-3xl mx-auto px-4 py-12 space-y-16">
          {role === 'organizer' && (
            <section>
              <h2 className="font-display font-black text-2xl tracking-[0.2em] uppercase mb-8 text-center border-b-2 border-black pb-4">建立開團</h2>
              <form onSubmit={handleCreateEvent} className="space-y-6">
                <div>
                  <label className="block font-display font-bold text-xs tracking-widest text-gray-500 mb-2 uppercase">開團名稱</label>
                  <input 
                    type="text" 
                    value={newEventName}
                    onChange={(e) => setNewEventName(e.target.value)}
                    placeholder="輸入開團名稱"
                    className="w-full px-0 py-3 border-b-2 border-gray-200 focus:outline-none focus:border-black font-display tracking-wide bg-transparent transition-colors text-lg placeholder-gray-300"
                    required
                  />
                </div>
                <div>
                  <label className="block font-display font-bold text-xs tracking-widest text-gray-500 mb-2 uppercase">設定密碼 (選填)</label>
                  <input 
                    type="text" 
                    value={newEventPassword}
                    onChange={(e) => setNewEventPassword(e.target.value)}
                    placeholder="設定密碼"
                    className="w-full px-0 py-3 border-b-2 border-gray-200 focus:outline-none focus:border-black font-display tracking-wide bg-transparent transition-colors text-lg placeholder-gray-300"
                  />
                </div>
                <div className="pt-4">
                  <button type="submit" className="w-full sm:w-auto bg-black text-white border-2 border-black font-display font-bold tracking-[0.2em] uppercase py-4 px-10 hover:bg-white hover:text-black transition-colors">
                    立即建立
                  </button>
                </div>
              </form>
            </section>
          )}

          <section>
            <h2 className="font-display font-black text-2xl tracking-[0.2em] uppercase mb-8 text-center border-b-2 border-black pb-4">進行中的開團</h2>
            
            <div className="space-y-6">
              {events.length === 0 ? (
                <div className="text-center text-gray-400 font-display tracking-widest py-10 uppercase text-sm">
                  目前沒有進行中的開團
                </div>
              ) : (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  {events.map(event => (
                    <div 
                      key={event.id} 
                      onClick={() => handleEventClick(event)}
                      className="group border-2 border-black p-6 hover:bg-black hover:text-white transition-colors cursor-pointer flex flex-col justify-between min-h-[160px] relative"
                    >
                      <div>
                        <div className="flex justify-between items-start mb-4">
                          <span className="font-display font-bold text-xs tracking-widest uppercase border border-current px-2 py-1">
                            {event.date}
                          </span>
                          {role === 'organizer' && (
                            <div onClick={(e) => e.stopPropagation()} className="z-10 relative">
                              {confirmDeleteId === event.id ? (
                                <div className="flex bg-white text-black border-2 border-black">
                                  <button onClick={(e) => handleDeleteEvent(e, event.id)} className="px-3 py-1 font-bold text-xs uppercase hover:bg-black hover:text-white transition-colors">刪除</button>
                                  <button onClick={(e) => { e.stopPropagation(); setConfirmDeleteId(null); }} className="px-3 py-1 font-bold text-xs uppercase border-l-2 border-black hover:bg-gray-200 transition-colors">取消</button>
                                </div>
                              ) : (
                                <button onClick={(e) => handleDeleteClick(e, event)} className="text-gray-400 group-hover:text-white/50 hover:!text-white transition-colors">
                                  <IconTrash className="w-5 h-5" />
                                </button>
                              )}
                            </div>
                          )}
                        </div>
                        <h3 className="font-display font-bold text-xl tracking-wider mb-2 leading-tight">
                          {event.name}
                        </h3>
                      </div>
                      
                      <div className="flex justify-between items-end mt-4">
                        <span className="font-display font-bold text-sm tracking-widest uppercase">
                          {event.orders.length} 份訂單
                        </span>
                        {role === 'organizer' && (
                          <span className="font-display font-black text-lg">
                            ${calculateTotal(event.orders)}
                          </span>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </section>
        </div>
      );

      const renderEventDetail = () => {
        if (!currentEvent) return null;
        
        return (
          <div className="max-w-4xl mx-auto px-4 py-8 space-y-12">
            
            {/* Header Area */}
            <div className="text-center mb-12">
              <h1 className="font-display font-black text-3xl sm:text-5xl tracking-[0.2em] uppercase mb-4 inline-block border-4 border-black px-6 py-4">
                {currentEvent.name}
              </h1>
              <div className="font-display font-bold tracking-widest text-gray-500 uppercase text-sm mt-4">
                {currentEvent.date}
              </div>
            </div>

            {/* Menu Image Section */}
            <section className="mb-16">
              {currentEvent.menuImage ? (
                <div className="relative group">
                  <img src={currentEvent.menuImage} alt="Menu" className="w-full h-auto object-cover border-2 border-black" />
                  {uploading && (
                    <div className="absolute inset-0 bg-white/80 flex flex-col items-center justify-center border-2 border-black">
                      <IconLoader className="w-8 h-8 mb-2" />
                      <span className="font-display font-bold tracking-widest uppercase text-xs">上傳中</span>
                    </div>
                  )}
                  {role === 'organizer' && !uploading && (
                    <button onClick={triggerFileInput} className="absolute inset-0 bg-black/60 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                      <div className="border-2 border-white text-white font-display font-bold tracking-widest uppercase px-6 py-3 bg-black/50 hover:bg-white hover:text-black transition-colors">
                        更換菜單
                      </div>
                    </button>
                  )}
                </div>
              ) : (
                <div className="w-full min-h-[300px] border-4 border-black flex flex-col items-center justify-center p-8 bg-gray-100">
                  {uploading ? (
                    <div className="text-center">
                      <IconLoader className="w-8 h-8 mx-auto mb-4" />
                      <span className="font-display font-bold tracking-widest uppercase text-sm">上傳中</span>
                    </div>
                  ) : role === 'organizer' ? (
                    <div className="text-center">
                      <p className="font-display font-bold tracking-widest text-gray-500 uppercase text-sm mb-6">尚未上傳菜單</p>
                      <button onClick={triggerFileInput} className="bg-black text-white font-display font-bold tracking-[0.1em] uppercase py-3 px-8 hover:bg-gray-800 transition-colors">
                        上傳照片
                      </button>
                    </div>
                  ) : (
                    <p className="font-display font-bold tracking-widest text-gray-500 uppercase text-sm">無菜單照片</p>
                  )}
                </div>
              )}
              <input type="file" accept="image/*" ref={fileInputRef} onChange={handleImageUpload} className="hidden" />
            </section>

            {/* Order Form */}
            {role === 'user' && !currentEvent.isClosed && (
              <section className="border-2 border-black p-6 sm:p-10 mb-16">
                <h2 className="font-display font-black text-2xl tracking-[0.2em] uppercase mb-8 text-center">我要點餐</h2>
                <form onSubmit={handleAddOrder} className="space-y-6 max-w-lg mx-auto">
                  <div>
                    <label className="block font-display font-bold text-xs tracking-widest text-gray-500 mb-2 uppercase">你的姓名</label>
                    <input 
                      type="text" value={newName} onChange={(e) => setNewName(e.target.value)}
                      placeholder="姓名"
                      className="w-full px-0 py-3 border-b-2 border-gray-200 focus:outline-none focus:border-black font-display tracking-wide bg-transparent transition-colors text-lg"
                      required
                    />
                  </div>
                  <div>
                    <label className="block font-display font-bold text-xs tracking-widest text-gray-500 mb-2 uppercase">餐點內容</label>
                    <input 
                      type="text" value={newItem} onChange={(e) => setNewItem(e.target.value)}
                      placeholder="餐點內容"
                      className="w-full px-0 py-3 border-b-2 border-gray-200 focus:outline-none focus:border-black font-display tracking-wide bg-transparent transition-colors text-lg"
                      required
                    />
                  </div>
                  <div className="pt-6 text-center">
                    <button type="submit" className="w-full sm:w-auto bg-black text-white border-2 border-black font-display font-bold tracking-[0.2em] uppercase py-4 px-12 hover:bg-white hover:text-black transition-colors">
                      送出點餐
                    </button>
                  </div>
                </form>
              </section>
            )}

            {/* Closed Alert */}
            {currentEvent.isClosed && (
              <div className="border-4 border-black p-6 text-center mb-16 bg-gray-100">
                <p className="font-display font-black text-xl tracking-[0.2em] uppercase mb-2">已停止收單</p>
                <p className="font-display tracking-widest text-gray-500 uppercase text-xs">主購已停止收單</p>
              </div>
            )}

            {/* Orders List */}
            <section>
              <div className="flex justify-between items-end border-b-4 border-black pb-4 mb-8">
                <h2 className="font-display font-black text-2xl tracking-[0.2em] uppercase">點餐清單</h2>
                <span className="font-display font-bold tracking-widest text-sm bg-black text-white px-3 py-1 uppercase">
                  總計: {currentEvent.orders.length}
                </span>
              </div>
              
              <div className="space-y-4">
                {currentEvent.orders.length === 0 ? (
                  <div className="text-center py-12 text-gray-400 font-display tracking-widest uppercase text-sm">
                    目前沒有人點餐喔
                  </div>
                ) : (
                  currentEvent.orders.map((order, index) => (
                    <div key={order.id} className="border-b-2 border-gray-200 pb-4 group">
                      {editingOrderId === order.id && role === 'user' ? (
                        <div className="flex flex-col sm:flex-row gap-4 items-end bg-gray-50 p-4 border-2 border-black">
                          <div className="flex-1 w-full">
                            <label className="block font-display font-bold text-[10px] tracking-widest text-gray-500 mb-1 uppercase">姓名</label>
                            <input 
                              type="text" defaultValue={order.name} id={`edit-name-${order.id}`}
                              className="w-full px-0 py-2 border-b-2 border-gray-300 focus:outline-none focus:border-black font-display bg-transparent text-sm"
                            />
                          </div>
                          <div className="flex-1 w-full">
                            <label className="block font-display font-bold text-[10px] tracking-widest text-gray-500 mb-1 uppercase">餐點</label>
                            <input 
                              type="text" defaultValue={order.item} id={`edit-item-${order.id}`}
                              className="w-full px-0 py-2 border-b-2 border-gray-300 focus:outline-none focus:border-black font-display bg-transparent text-sm"
                            />
                          </div>
                          <div className="flex space-x-2 w-full sm:w-auto mt-4 sm:mt-0">
                            <button onClick={() => toggleEditMode(order.id)} className="flex-1 sm:flex-none border-2 border-black px-4 py-2 font-display font-bold uppercase text-xs hover:bg-gray-100">取消</button>
                            <button onClick={() => {
                                const newN = document.getElementById(`edit-name-${order.id}`).value;
                                const newI = document.getElementById(`edit-item-${order.id}`).value;
                                handleUpdateOrder(order.id, newN, newI);
                              }} className="flex-1 sm:flex-none bg-black text-white border-2 border-black px-4 py-2 font-display font-bold uppercase text-xs hover:bg-white hover:text-black transition-colors">儲存</button>
                          </div>
                        </div>
                      ) : (
                        <div className="flex flex-col sm:flex-row justify-between sm:items-center">
                          <div className="flex items-start">
                            <div className="font-display font-black text-gray-300 text-2xl w-8 hidden sm:block">{index + 1}</div>
                            <div>
                              <div className="font-display font-bold text-lg tracking-wide uppercase">{order.name}</div>
                              <div className="text-gray-600 mt-1">{order.item}</div>
                            </div>
                          </div>
                          
                          <div className="mt-4 sm:mt-0 flex flex-wrap items-center gap-4 sm:justify-end">
                            {role === 'organizer' ? (
                              <>
                                <div className="flex items-center">
                                  <span className="font-display font-bold mr-1">$</span>
                                  <PriceInput order={order} onUpdate={handleUpdatePrice} />
                                </div>
                                <button 
                                  onClick={() => handleTogglePaid(order.id)}
                                  className={`border-2 px-3 py-1 font-display font-bold text-xs tracking-widest uppercase transition-colors ${order.hasPaid ? 'bg-black text-white border-black' : 'bg-white text-gray-400 border-gray-200 hover:border-black hover:text-black'}`}
                                >
                                  {order.hasPaid ? '已付款' : '未付款'}
                                </button>
                              </>
                            ) : (
                              <>
                                {order.price && (
                                  <div className="font-display font-bold text-lg border-b-2 border-black px-1">
                                    ${order.price}
                                  </div>
                                )}
                                {(order.price || currentEvent.isClosed) && (
                                  <div className={`border-2 px-2 py-1 font-display font-bold text-[10px] tracking-widest uppercase ${order.hasPaid ? 'bg-black text-white border-black' : 'bg-transparent text-gray-400 border-gray-200'}`}>
                                    {order.hasPaid ? '已付款' : '未付款'}
                                  </div>
                                )}
                                {!currentEvent.isClosed && (
                                  <div className="flex space-x-3 ml-2 border-l-2 border-gray-200 pl-4">
                                    <button onClick={() => toggleEditMode(order.id)} className="text-gray-400 hover:text-black transition-colors"><IconEdit className="w-5 h-5" /></button>
                                    <button onClick={() => handleDeleteOrder(order.id)} className="text-gray-400 hover:text-black transition-colors"><IconTrash className="w-5 h-5" /></button>
                                  </div>
                                )}
                              </>
                            )}
                          </div>
                        </div>
                      )}
                    </div>
                  ))
                )}
              </div>
              
              {role === 'organizer' && currentEvent.orders.length > 0 && (
                <div className="mt-8 border-4 border-black p-6 flex justify-between items-center bg-white">
                  <span className="font-display font-bold tracking-[0.2em] uppercase text-sm sm:text-base">總計金額</span>
                  <span className="font-display font-black text-3xl sm:text-4xl">${calculateTotal(currentEvent.orders)}</span>
                </div>
              )}

              {role === 'organizer' && (
                <div className="mt-12 text-center">
                  <button 
                    onClick={toggleEventClosed}
                    className={`border-2 border-black font-display font-bold tracking-[0.2em] uppercase py-3 px-8 transition-colors ${currentEvent.isClosed ? 'bg-white text-black hover:bg-gray-100' : 'bg-black text-white hover:bg-white hover:text-black'}`}
                  >
                    {currentEvent.isClosed ? '重新開放點餐' : '停止點餐 (結單)'}
                  </button>
                </div>
              )}
            </section>
          </div>
        );
      };

      return (
        <div className="min-h-screen">
          {/* Header */}
          <header className="border-b-2 border-black bg-white sticky top-0 z-20">
            <div className="max-w-6xl mx-auto px-4 py-4 sm:py-6 flex flex-col sm:flex-row justify-between items-center gap-4">
              <div className="flex items-center w-full sm:w-auto justify-between sm:justify-start">
                {currentEventId && (
                  <button onClick={() => setCurrentEventId(null)} className="mr-4 text-black hover:text-gray-500 transition-colors">
                    <IconArrowLeft className="w-6 h-6" />
                  </button>
                )}
                <div className="border-4 border-black px-4 sm:px-6 py-2 font-display font-bold tracking-[0.2em] text-lg sm:text-xl uppercase truncate max-w-[200px] sm:max-w-md">
                  {currentEventId && currentEvent ? currentEvent.name : 'Order師傅'}
                </div>
              </div>
              
              <div className="flex space-x-6 sm:space-x-8 font-display text-xs sm:text-sm tracking-widest font-bold">
                <button
                  onClick={() => handleRoleChange('user')}
                  className={`pb-1 uppercase transition-colors ${role === 'user' ? 'text-black border-b-2 border-black' : 'text-gray-400 hover:text-black'}`}
                >
                  使用者
                </button>
                <button
                  onClick={() => handleRoleChange('organizer')}
                  className={`pb-1 uppercase transition-colors ${role === 'organizer' ? 'text-black border-b-2 border-black' : 'text-gray-400 hover:text-black'}`}
                >
                  開團者
                </button>
              </div>
            </div>
          </header>
          
          <main>
            {!currentEventId ? renderDashboard() : renderEventDetail()}
          </main>

          {passwordPromptId && (
            <div className="fixed inset-0 bg-white/90 flex items-center justify-center z-50 p-4">
              <div className="border-4 border-black bg-white p-8 sm:p-12 w-full max-w-md shadow-[12px_12px_0px_0px_rgba(0,0,0,1)]">
                <form onSubmit={handlePasswordSubmit} className="flex flex-col space-y-8">
                  <div className="text-center">
                    <h2 className="font-display font-black text-2xl tracking-[0.2em] uppercase mb-2">
                      {passwordPromptAction === 'delete' ? '刪除開團' : '開團者驗證'}
                    </h2>
                    <p className="font-display tracking-widest text-gray-500 uppercase text-xs">
                      {passwordPromptAction === 'delete' ? '請輸入密碼以確認刪除' : '請輸入密碼以進入管理介面'}
                    </p>
                  </div>
                  
                  <input
                    type="password"
                    value={eventPasswordInput}
                    onChange={(e) => setEventPasswordInput(e.target.value)}
                    placeholder="請輸入密碼"
                    className="w-full px-0 py-4 border-b-4 border-gray-200 focus:outline-none focus:border-black font-display tracking-[0.3em] text-center text-xl transition-colors bg-transparent placeholder-gray-300"
                    autoFocus
                  />
                  {passwordError && <p className="text-black font-display font-bold text-xs tracking-widest text-center uppercase bg-gray-100 py-2">{passwordError}</p>}
                  
                  <div className="flex space-x-4 pt-4">
                    <button type="button" onClick={() => setPasswordPromptId(null)} className="flex-1 border-2 border-black bg-white text-black font-display font-bold tracking-[0.1em] uppercase py-3 hover:bg-gray-100 transition-colors text-sm">取消</button>
                    <button type="submit" className="flex-1 bg-black text-white border-2 border-black font-display font-bold tracking-[0.1em] uppercase py-3 hover:bg-white hover:text-black transition-colors text-sm">確認</button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
