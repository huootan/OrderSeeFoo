<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分隊點餐系統 (即時連線版)</title>
  
  <!-- 載入 Google Fonts: Playfair Display & Noto Serif/Sans TC -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@500;700;900&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">

  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 設定 Tailwind 自訂主題 (烘焙坊風格) -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#fdf8f5',
              100: '#f8efe6',
              200: '#eedac5',
              300: '#e1bd9d',
              400: '#cf986c',
              500: '#c17a44',
              600: '#b36136',
              700: '#95492d',
              800: '#7a3e29',
              900: '#623523',
            },
            surface: '#fbfaf8', // 溫暖的米白色背景
            ink: '#2a2421',     // 深咖啡/炭灰色文字
            paper: '#ffffff',   // 卡片白
          },
          fontFamily: {
            sans: ['"Noto Sans TC"', 'sans-serif'],
            serif: ['"Playfair Display"', '"Noto Serif TC"', 'serif'],
          },
          boxShadow: {
            'soft': '0 4px 20px -2px rgba(98, 53, 35, 0.05)',
            'float': '0 10px 30px -5px rgba(98, 53, 35, 0.08)',
          }
        }
      }
    }
  </script>

  <!-- 載入 Firebase Compat -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

  <!-- 載入 React 與 Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    /* 全局平滑過渡 */
    * { transition: background-color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease; }
    body { background-color: #fbfaf8; color: #2a2421; }
    /* 隱藏捲軸但可滾動 (美觀) */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #eedac5; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #cf986c; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="config.js"></script>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // --- Firebase 初始化區塊 ---
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();
    const storage = firebase.storage();

    // --- 圖示元件定義區 ---
    const IconPlus = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const IconTrash = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
    const IconCamera = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path><circle cx="12" cy="13" r="3"></circle></svg>;
    const IconEdit = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
    const IconCheck = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;
    const IconX = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
    const IconImage = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>;
    const IconArrowLeft = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
    const IconCalendar = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
    const IconFileText = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>;
    const IconChevronRight = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>;
    const IconUser = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
    const IconUserCog = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M19 11v2"></path><path d="M19 15v2"></path><path d="M21.6 12.5l-1.7 1"></path><path d="M17.4 15.5l-1.7 1"></path><path d="M21.6 15.5l-1.7-1"></path><path d="M17.4 12.5l-1.7-1"></path><circle cx="19" cy="13" r="2"></circle></svg>;
    const IconLock = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
    const IconLoader = ({ className }) => <svg className={`animate-spin ${className}`} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>;

    // 專用的 PriceInput
    const PriceInput = ({ order, onUpdate }) => {
      const [val, setVal] = useState(order.price);
      useEffect(() => { setVal(order.price); }, [order.price]);
      return (
        <input 
          type="number" 
          min="0" 
          value={val}
          onChange={(e) => setVal(e.target.value)}
          onBlur={() => onUpdate(order.id, val)}
          placeholder="金額"
          className="w-20 px-2 py-1 text-right border-b border-brand-200 bg-transparent focus:outline-none focus:border-brand-500 font-medium text-ink transition-colors"
        />
      );
    };

    // --- 主程式區塊 ---
    function App() {
      const [role, setRole] = useState('user');
      const [events, setEvents] = useState([]);
      const [loading, setLoading] = useState(true);
      const [currentEventId, setCurrentEventId] = useState(null);
      const [newEventName, setNewEventName] = useState('');
      const [newEventPassword, setNewEventPassword] = useState('');
      const [passwordPromptId, setPasswordPromptId] = useState(null);
      const [eventPasswordInput, setEventPasswordInput] = useState('');
      const [passwordError, setPasswordError] = useState('');
      const [confirmDeleteId, setConfirmDeleteId] = useState(null);
      const [newName, setNewName] = useState('');
      const [newItem, setNewItem] = useState('');
      const [editingOrderId, setEditingOrderId] = useState(null);
      const [uploading, setUploading] = useState(false);
      const fileInputRef = useRef(null);

      // Firestore 即時監聽
      useEffect(() => {
        const unsubscribe = db.collection('events').orderBy('createdAt', 'desc').onSnapshot((snapshot) => {
          const eventsData = snapshot.docs.map(doc => ({
            id: doc.id,
            ...doc.data()
          }));
          setEvents(eventsData);
          setLoading(false);
        }, (error) => {
          console.error("載入資料失敗:", error);
          setLoading(false);
        });

        return () => unsubscribe();
      }, []);

      const currentEvent = events.find(e => e.id === currentEventId);

      const handleCreateEvent = async (e) => {
        e.preventDefault();
        if (!newEventName.trim()) return;
        try {
          await db.collection('events').add({
            name: newEventName.trim(),
            password: newEventPassword.trim(),
            date: new Date().toLocaleDateString('zh-TW', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }),
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            menuImage: null,
            orders: [],
            isClosed: false
          });
          setNewEventName('');
          setNewEventPassword('');
        } catch (error) {
          console.error("Error creating event:", error);
          alert("建立失敗：" + error.message);
        }
      };

      const handleDeleteEvent = async (e, id) => {
        e.stopPropagation();
        try {
          await db.collection('events').doc(id).delete();
          setConfirmDeleteId(null);
          if (currentEventId === id) setCurrentEventId(null);
        } catch (error) {
          alert("刪除失敗：" + error.message);
        }
      };

      const handleImageUpload = async (e) => {
        const file = e.target.files[0];
        if (file && currentEventId) {
          setUploading(true);
          try {
            const storageRef = storage.ref();
            const fileRef = storageRef.child(`menus/${currentEventId}/${Date.now()}_${file.name}`);
            await fileRef.put(file);
            const url = await fileRef.getDownloadURL();
            await db.collection('events').doc(currentEventId).update({
              menuImage: url
            });
          } catch (error) {
            console.error("Error uploading image:", error);
            alert("上傳失敗：" + error.message);
          } finally {
            setUploading(false);
          }
        }
      };

      const triggerFileInput = () => {
        if (fileInputRef.current) {
          fileInputRef.current.click();
        }
      };

      const handleEventClick = (event) => {
        if (role === 'organizer' && event.password) {
          setPasswordPromptId(event.id);
          setEventPasswordInput('');
          setPasswordError('');
        } else {
          setCurrentEventId(event.id);
        }
      };

      const handlePasswordSubmit = (e) => {
        e.preventDefault();
        e.stopPropagation();
        const targetEvent = events.find(ev => ev.id === passwordPromptId);
        if (targetEvent && targetEvent.password === eventPasswordInput) {
          setCurrentEventId(passwordPromptId);
          setRole('organizer');
          setPasswordPromptId(null);
        } else {
          setPasswordError('密碼錯誤，請重新輸入。');
        }
      };

      const handleRoleChange = (newRole) => {
        if (newRole === 'organizer') {
          setCurrentEventId(null);
          setPasswordPromptId(null);
          setEventPasswordInput('');
          setPasswordError('');
        }
        setRole(newRole);
      };

      const toggleEventClosed = async () => {
        if (!currentEvent) return;
        await db.collection('events').doc(currentEvent.id).update({
          isClosed: !currentEvent.isClosed
        });
      };

      const handleAddOrder = async (e) => {
        e.preventDefault();
        if (!newName.trim() || !newItem.trim() || !currentEvent) return;
        
        const newOrder = {
          id: Date.now().toString() + Math.random().toString(36).substring(7),
          name: newName.trim(),
          item: newItem.trim(),
          price: '',
          hasPaid: false
        };
        
        try {
          await db.collection('events').doc(currentEvent.id).update({
            orders: firebase.firestore.FieldValue.arrayUnion(newOrder)
          });
          setNewName('');
          setNewItem('');
        } catch (error) {
          alert("點餐失敗：" + error.message);
        }
      };

      const handleDeleteOrder = async (orderId) => {
        if (!currentEvent) return;
        const newOrders = currentEvent.orders.filter(order => order.id !== orderId);
        await db.collection('events').doc(currentEvent.id).update({ orders: newOrders });
      };

      const toggleEditMode = (orderId) => {
        setEditingOrderId(editingOrderId === orderId ? null : orderId);
      };

      const handleUpdateOrder = async (orderId, updatedName, updatedItem) => {
        if (!currentEvent) return;
        const newOrders = currentEvent.orders.map(order => 
          order.id === orderId ? { ...order, name: updatedName, item: updatedItem } : order
        );
        await db.collection('events').doc(currentEvent.id).update({ orders: newOrders });
        setEditingOrderId(null);
      };

      const handleUpdatePrice = async (orderId, price) => {
        if (!currentEvent) return;
        const newOrders = currentEvent.orders.map(order => 
          order.id === orderId ? { ...order, price: price } : order
        );
        await db.collection('events').doc(currentEvent.id).update({ orders: newOrders });
      };

      const handleTogglePaid = async (orderId) => {
        if (!currentEvent) return;
        const newOrders = currentEvent.orders.map(order => 
          order.id === orderId ? { ...order, hasPaid: !order.hasPaid } : order
        );
        await db.collection('events').doc(currentEvent.id).update({ orders: newOrders });
      };

      const calculateTotal = (orders) => {
        return orders.reduce((total, order) => {
          const priceNum = parseInt(order.price, 10);
          return total + (isNaN(priceNum) ? 0 : priceNum);
        }, 0);
      };

      if (loading) {
        return (
          <div className="min-h-screen bg-surface flex flex-col items-center justify-center text-brand-600">
            <IconLoader className="w-10 h-10 mb-4 text-brand-500" />
            <p className="font-serif italic tracking-wider">Loading...</p>
          </div>
        );
      }

      const renderDashboard = () => (
        <div className="max-w-md mx-auto p-4 space-y-8 animate-fade-in mt-4">
          {role === 'organizer' && (
            <form onSubmit={handleCreateEvent} className="bg-paper rounded-2xl shadow-soft p-6 border border-brand-50">
              <h2 className="text-xl font-serif font-bold mb-5 text-ink flex items-center">
                <IconPlus className="w-5 h-5 mr-2 text-brand-500" /> 建立新開團
              </h2>
              <div className="flex flex-col space-y-4">
                <input 
                  type="text" 
                  value={newEventName}
                  onChange={(e) => setNewEventName(e.target.value)}
                  placeholder="輸入開團名稱 (例: 手工貝果團)"
                  className="w-full px-4 py-3 border border-brand-200 rounded-xl focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 bg-brand-50/30 transition-colors"
                  required
                />
                <input 
                  type="text" 
                  value={newEventPassword}
                  onChange={(e) => setNewEventPassword(e.target.value)}
                  placeholder="設定密碼 (選填)"
                  className="w-full px-4 py-3 border border-brand-200 rounded-xl focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 bg-brand-50/30 transition-colors"
                />
                <button 
                  type="submit"
                  className="w-full bg-brand-600 text-white font-bold py-3 px-6 rounded-xl shadow-md hover:bg-brand-700 hover:shadow-lg transition-all"
                >
                  建立開團
                </button>
              </div>
            </form>
          )}

          <div className="bg-paper rounded-2xl shadow-soft overflow-hidden border border-brand-50">
            <div className="p-5 border-b border-brand-100 flex items-center justify-between">
              <h2 className="text-xl font-serif font-bold text-ink flex items-center">
                <IconCalendar className="w-5 h-5 mr-2 text-brand-500" /> 進行中的點餐
              </h2>
            </div>
            
            <div className="divide-y divide-brand-50">
              {events.length === 0 ? (
                <div className="p-10 text-center text-ink/40 text-sm font-medium">
                  目前沒有任何進行中的開團。
                </div>
              ) : (
                events.map(event => (
                  <div 
                    key={event.id} 
                    onClick={() => handleEventClick(event)}
                    className="p-5 hover:bg-brand-50/50 transition-colors cursor-pointer flex justify-between items-center group"
                  >
                    <div className="flex-1 pr-4">
                      <h3 className="font-serif font-bold text-ink text-lg mb-1 flex items-center">
                          {event.password && <IconLock className="w-4 h-4 mr-2 text-brand-400" title="需要密碼" />}
                          {event.name}
                        </h3>
                        <div className="flex items-center text-sm text-ink/60 space-x-3">
                          <span>{event.date}</span>
                          <span className="bg-brand-100 text-brand-800 px-2.5 py-0.5 rounded-full text-xs font-medium tracking-wide">
                            {event.orders.length} 份訂單
                          </span>
                        </div>
                      </div>
                      
                      <div className="flex items-center space-x-4">
                        {role === 'organizer' && (
                          <div className="text-right mr-2 hidden sm:block">
                            <div className="text-xs text-ink/50 mb-0.5">預估總額</div>
                            <div className="font-bold text-ink">${calculateTotal(event.orders)}</div>
                          </div>
                        )}
                        {role === 'organizer' && (
                          <div className="flex items-center">
                            {confirmDeleteId === event.id ? (
                              <div className="flex items-center bg-red-50 rounded-xl p-1.5 space-x-2" onClick={(e) => e.stopPropagation()}>
                                <button onClick={(e) => handleDeleteEvent(e, event.id)} className="px-3 py-1 bg-red-500 text-white text-xs font-bold rounded-lg shadow-sm hover:bg-red-600">刪除</button>
                                <button onClick={(e) => { e.stopPropagation(); setConfirmDeleteId(null); }} className="px-3 py-1 text-ink/70 text-xs font-bold rounded-lg hover:bg-red-100">取消</button>
                              </div>
                            ) : (
                              <button 
                                onClick={(e) => { e.stopPropagation(); setConfirmDeleteId(event.id); }}
                                className="p-2.5 text-ink/30 hover:text-red-500 hover:bg-red-50 rounded-full transition-colors"
                                title="刪除開團"
                              >
                                <IconTrash className="w-5 h-5" />
                              </button>
                            )}
                          </div>
                        )}
                        <div className="w-8 h-8 rounded-full bg-brand-50 flex items-center justify-center group-hover:bg-brand-100 transition-colors">
                          <IconChevronRight className="w-4 h-4 text-brand-600" />
                        </div>
                      </div>
                    </div>
                ))
              )}
            </div>
          </div>
        </div>
      );

      const renderEventDetail = () => {
        if (!currentEvent) return null;
        
        return (
          <div className="max-w-md mx-auto p-4 space-y-8 mt-4 animate-fade-in">
            <div className="bg-paper rounded-2xl shadow-soft p-5 border border-brand-50">
              <h2 className="text-xl font-serif font-bold mb-4 flex items-center text-ink">
                <IconImage className="w-5 h-5 mr-2 text-brand-500" />
                本日菜單
              </h2>
              
              {currentEvent.menuImage ? (
                <div className="relative group rounded-xl overflow-hidden border border-brand-100 min-h-[120px] flex items-center justify-center bg-brand-50/30">
                  <img src={currentEvent.menuImage} alt="菜單" className="w-full h-auto object-contain max-h-96" />
                  {uploading && (
                    <div className="absolute inset-0 bg-ink/50 backdrop-blur-sm flex flex-col items-center justify-center text-white">
                      <IconLoader className="w-8 h-8 mb-2 text-white" />
                      <span className="font-medium tracking-wide">上傳中...</span>
                    </div>
                  )}
                  {role === 'organizer' && !uploading && (
                    <button 
                      onClick={triggerFileInput}
                      className="absolute inset-0 bg-ink/40 backdrop-blur-sm text-white flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all duration-300"
                    >
                      <div className="bg-white/20 px-4 py-2 rounded-full flex items-center backdrop-blur-md">
                        <IconCamera className="w-5 h-5 mr-2" /> <span className="font-medium">更換菜單</span>
                      </div>
                    </button>
                  )}
                </div>
              ) : (
                <div className="flex flex-col items-center justify-center p-10 border-2 border-dashed border-brand-200 rounded-xl bg-brand-50/30 relative overflow-hidden transition-colors hover:bg-brand-50">
                  {uploading && (
                    <div className="absolute inset-0 bg-white/90 z-10 flex flex-col items-center justify-center text-brand-600 backdrop-blur-sm">
                      <IconLoader className="w-8 h-8 mb-2" />
                      <span className="font-bold tracking-wide">上傳中...</span>
                    </div>
                  )}
                  {role === 'organizer' ? (
                    <>
                      <p className="text-ink/60 mb-5 text-sm text-center">目前還沒有菜單照片，請上傳一張讓大家參考。</p>
                      <button 
                        onClick={triggerFileInput}
                        className="flex items-center px-5 py-2.5 bg-brand-100 text-brand-800 rounded-full hover:bg-brand-200 font-bold disabled:opacity-50 transition-colors shadow-sm"
                        disabled={uploading}
                      >
                        <IconCamera className="w-5 h-5 mr-2" /> 上傳菜單
                      </button>
                    </>
                  ) : (
                    <p className="text-ink/50 text-sm font-medium">開團者尚未上傳菜單照片</p>
                  )}
                </div>
              )}
              <input 
                type="file" 
                accept="image/*" 
                ref={fileInputRef} 
                onChange={handleImageUpload} 
                className="hidden" 
              />
            </div>

            {role === 'organizer' && (
              <div className="flex justify-end">
                <button 
                  onClick={toggleEventClosed}
                  className={`px-5 py-2.5 rounded-full font-bold text-white shadow-md transition-all flex items-center ${currentEvent.isClosed ? 'bg-ink hover:bg-ink/80' : 'bg-brand-600 hover:bg-brand-700 hover:shadow-lg'}`}
                >
                  {currentEvent.isClosed ? '取消結單 (重新開放)' : '停止點餐 (結單)'}
                </button>
              </div>
            )}

            {role === 'user' && !currentEvent.isClosed && (
              <form onSubmit={handleAddOrder} className="bg-paper rounded-2xl shadow-float p-6 border border-brand-50 relative overflow-hidden">
                <div className="absolute top-0 left-0 w-full h-1 bg-brand-400"></div>
                <h2 className="text-xl font-serif font-bold mb-5 text-ink">我要點餐</h2>
                <div className="space-y-4">
                  <div>
                    <label className="block text-sm font-bold text-ink/70 mb-1.5 ml-1">姓名</label>
                    <input 
                      type="text" 
                      value={newName}
                      onChange={(e) => setNewName(e.target.value)}
                      placeholder="輸入你的名字"
                      className="w-full px-4 py-3 border border-brand-200 rounded-xl focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 bg-surface transition-colors"
                      required
                    />
                  </div>
                  <div>
                    <label className="block text-sm font-bold text-ink/70 mb-1.5 ml-1">餐點內容</label>
                    <input 
                      type="text" 
                      value={newItem}
                      onChange={(e) => setNewItem(e.target.value)}
                      placeholder="想吃什麼？"
                      className="w-full px-4 py-3 border border-brand-200 rounded-xl focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 bg-surface transition-colors"
                      required
                    />
                  </div>
                  <button 
                    type="submit"
                    className="w-full bg-ink text-white font-bold py-3.5 px-4 rounded-xl shadow-md hover:bg-ink/90 flex items-center justify-center transition-all mt-2"
                  >
                    <IconPlus className="w-5 h-5 mr-2" /> 送出訂單
                  </button>
                </div>
              </form>
            )}

            {role === 'user' && currentEvent.isClosed && (
              <div className="bg-brand-50 border border-brand-100 text-brand-900 p-5 rounded-2xl text-center shadow-soft">
                <div className="w-12 h-12 bg-brand-100 rounded-full flex items-center justify-center mx-auto mb-3">
                  <IconLock className="w-6 h-6 text-brand-600" />
                </div>
                <p className="font-serif font-bold text-lg mb-1">此團已結單</p>
                <p className="text-sm text-brand-800/80">主購已停止收單，無法再新增或修改餐點囉！</p>
              </div>
            )}

            <div className="bg-paper rounded-2xl shadow-soft overflow-hidden border border-brand-50">
              <div className="p-5 border-b border-brand-100 flex justify-between items-center bg-white">
                <h2 className="text-xl font-serif font-bold text-ink flex items-center">
                  <IconFileText className="w-5 h-5 mr-2 text-brand-500" /> 點餐清單
                </h2>
                <span className="text-sm bg-brand-50 border border-brand-100 text-brand-800 px-3 py-1 rounded-full font-bold shadow-sm">
                  共 {currentEvent.orders.length} 份
                </span>
              </div>
              
              <div className="divide-y divide-brand-50">
                {currentEvent.orders.length === 0 ? (
                  <div className="p-10 text-center text-ink/40 text-sm font-medium">
                    目前還沒有人點餐喔！
                  </div>
                ) : (
                  currentEvent.orders.map(order => (
                    <div key={order.id} className="p-5 hover:bg-brand-50/30 transition-colors">
                      {editingOrderId === order.id && role === 'user' ? (
                        <div className="space-y-3 bg-brand-50/50 p-4 rounded-xl border border-brand-100">
                          <input 
                            type="text" 
                            defaultValue={order.name}
                            id={`edit-name-${order.id}`}
                            className="w-full px-3 py-2 border border-brand-200 rounded-lg text-sm focus:ring-1 focus:ring-brand-500"
                            placeholder="姓名"
                          />
                          <input 
                            type="text" 
                            defaultValue={order.item}
                            id={`edit-item-${order.id}`}
                            className="w-full px-3 py-2 border border-brand-200 rounded-lg text-sm focus:ring-1 focus:ring-brand-500"
                            placeholder="餐點內容"
                          />
                          <div className="flex justify-end space-x-2 pt-2">
                            <button 
                              onClick={() => toggleEditMode(order.id)}
                              className="px-4 py-1.5 text-sm font-bold text-ink/60 bg-white border border-brand-200 rounded-lg hover:bg-brand-50 flex items-center shadow-sm"
                            >
                              <IconX className="w-4 h-4 mr-1" /> 取消
                            </button>
                            <button 
                              onClick={() => {
                                const newN = document.getElementById(`edit-name-${order.id}`).value;
                                const newI = document.getElementById(`edit-item-${order.id}`).value;
                                handleUpdateOrder(order.id, newN, newI);
                              }}
                              className="px-4 py-1.5 text-sm font-bold text-white bg-brand-600 rounded-lg hover:bg-brand-700 flex items-center shadow-sm"
                            >
                              <IconCheck className="w-4 h-4 mr-1" /> 儲存
                            </button>
                          </div>
                        </div>
                      ) : (
                        <div className="flex justify-between items-start">
                          <div className="flex-1 pr-4">
                            <div className="font-bold text-ink text-base">{order.name}</div>
                            <div className="text-ink/70 text-sm mt-1">{order.item}</div>
                          </div>
                          
                          <div className="flex flex-col items-end space-y-2">
                            {role === 'organizer' ? (
                              <div className="flex flex-col items-end space-y-2 mt-1">
                                <div className="flex items-center">
                                  <span className="text-sm text-brand-600 font-bold mr-1">$</span>
                                  <PriceInput order={order} onUpdate={handleUpdatePrice} />
                                </div>
                                <button 
                                  onClick={() => handleTogglePaid(order.id)}
                                  className={`px-3 py-1 text-xs rounded-full font-bold transition-all shadow-sm ${order.hasPaid ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-surface border border-brand-200 text-ink/60 hover:bg-brand-50'}`}
                                >
                                  {order.hasPaid ? '✓ 已付款' : '未付款'}
                                </button>
                              </div>
                            ) : (
                              !currentEvent.isClosed && (
                                <div className="flex space-x-1">
                                  <button 
                                    onClick={() => toggleEditMode(order.id)}
                                    className="p-2 text-brand-500 hover:bg-brand-50 rounded-full transition-colors"
                                    title="編輯"
                                  >
                                    <IconEdit className="w-4 h-4" />
                                  </button>
                                  <button 
                                    onClick={() => handleDeleteOrder(order.id)}
                                    className="p-2 text-ink/30 hover:text-red-500 hover:bg-red-50 rounded-full transition-colors"
                                    title="刪除"
                                  >
                                    <IconTrash className="w-4 h-4" />
                                  </button>
                                </div>
                              )
                            )}
                            {role === 'user' && (order.price || currentEvent.isClosed) && (
                              <div className="flex items-center space-x-2 mt-1">
                                {order.price && (
                                  <div className="text-brand-700 font-bold text-sm bg-brand-50 border border-brand-100 px-2 py-1 rounded-md shadow-sm">
                                    ${order.price}
                                  </div>
                                )}
                                <div className={`text-xs px-2 py-1 rounded-md font-bold shadow-sm ${order.hasPaid ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-surface border border-brand-200 text-ink/50'}`}>
                                  {order.hasPaid ? '✓ 已付款' : '未付款'}
                                </div>
                              </div>
                            )}
                          </div>
                        </div>
                      )}
                    </div>
                  ))
                )}
              </div>
              
              {role === 'organizer' && currentEvent.orders.length > 0 && (
                <div className="bg-brand-50 p-5 border-t border-brand-100 flex justify-between items-center">
                  <span className="font-serif font-bold text-ink">本次團購總金額：</span>
                  <span className="text-2xl font-black text-brand-600">${calculateTotal(currentEvent.orders)}</span>
                </div>
              )}
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-surface text-ink font-sans pb-24 selection:bg-brand-200">
          <div className="bg-white/80 backdrop-blur-md text-ink sticky top-0 z-20 px-4 py-4 shadow-sm border-b border-brand-100 flex justify-between items-center transition-all">
            <div className="flex items-center max-w-[60%]">
              {currentEventId ? (
                <button 
                  onClick={() => setCurrentEventId(null)}
                  className="mr-2 p-1.5 hover:bg-brand-50 rounded-full transition-colors flex items-center text-brand-600 shrink-0"
                >
                  <IconArrowLeft className="w-5 h-5" />
                </button>
              ) : null}
              <h1 className="text-xl sm:text-2xl font-serif font-bold truncate tracking-wide text-ink">
                {currentEventId && currentEvent ? currentEvent.name : <><span className="text-brand-600 italic mr-1">Order</span> 點餐系統</>}
              </h1>
            </div>
            
            <div className="flex bg-brand-50 rounded-full p-1 border border-brand-100 shadow-inner">
              <button
                onClick={() => handleRoleChange('user')}
                className={`flex items-center px-3 py-1.5 sm:px-4 sm:py-1.5 text-xs sm:text-sm rounded-full font-bold transition-all ${role === 'user' ? 'bg-white text-brand-700 shadow-sm border border-brand-100/50' : 'text-ink/60 hover:text-ink'}`}
              >
                <span className="hidden sm:inline mr-1">🍔</span> 使用者
              </button>
              <button
                onClick={() => handleRoleChange('organizer')}
                className={`flex items-center px-3 py-1.5 sm:px-4 sm:py-1.5 text-xs sm:text-sm rounded-full font-bold transition-all ${role === 'organizer' ? 'bg-white text-brand-700 shadow-sm border border-brand-100/50' : 'text-ink/60 hover:text-ink'}`}
              >
                <span className="hidden sm:inline mr-1">👑</span> 開團者
              </button>
            </div>
          </div>
          
          <div className="mt-6 px-2">
            {!currentEventId ? renderDashboard() : renderEventDetail()}
          </div>

          {passwordPromptId && (
            <div className="fixed inset-0 bg-ink/40 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-fade-in">
              <div className="bg-paper rounded-2xl shadow-float p-8 w-full max-w-sm border border-brand-50">
                <form onSubmit={handlePasswordSubmit} className="flex flex-col space-y-5">
                  <div className="flex items-center text-ink font-serif font-bold text-xl justify-center mb-2">
                    <div className="w-10 h-10 bg-brand-50 rounded-full flex items-center justify-center mr-3">
                      <IconLock className="w-5 h-5 text-brand-600" />
                    </div>
                    開團者驗證
                  </div>
                  <p className="text-sm text-ink/60 text-center">請輸入密碼以行使開團者權限</p>
                  <input
                    type="password"
                    value={eventPasswordInput}
                    onChange={(e) => setEventPasswordInput(e.target.value)}
                    placeholder="請輸入密碼"
                    className="w-full px-4 py-3 border border-brand-200 rounded-xl focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 text-center tracking-widest bg-surface"
                    autoFocus
                  />
                  {passwordError && <p className="text-red-500 text-sm text-center font-medium">{passwordError}</p>}
                  <div className="flex justify-center space-x-3 pt-4">
                    <button type="button" onClick={() => setPasswordPromptId(null)} className="px-6 py-2.5 bg-surface border border-brand-200 text-ink/70 font-bold rounded-full hover:bg-brand-50 transition-colors w-1/2">取消</button>
                    <button type="submit" className="px-6 py-2.5 bg-ink text-white font-bold rounded-full shadow-md hover:bg-ink/90 transition-all w-1/2">確認</button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
